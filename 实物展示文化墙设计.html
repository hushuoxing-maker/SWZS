<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实物展示文化墙设计提示词生成器</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #0284C7;
      --primary-light: #38BDF8;
      --primary-dark: #0369A1;
      --success: #10B981;
      --warning: #F59E0B;
      --danger: #EF4444;
      --bg-dark: #0F172A;
      --bg-card: #1E293B;
      --bg-item: #1F2937;
      --text-primary: #FFFFFF;
      --text-secondary: #94A3B8;
      --border: rgba(148, 163, 184, 0.1);
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "思源黑体", sans-serif;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #0F172A 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      padding: 20px 0 100px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(2, 132, 199, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: -1;
    }

    .header {
      text-align: center;
      padding: 48px 20px 32px;
    }

    .header h1 {
      font-size: clamp(24px, 6vw, 36px);
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #38BDF8 0%, #06B6D4 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }

    .header .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .header .feature-badge {
      display: inline-block;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #10B981;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin-top: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-section {
      max-width: 920px;
      margin: 0 auto 32px;
      padding: 0 20px;
    }

    .input-wrap {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }

    .input-wrap:hover {
      border-color: rgba(2, 132, 199, 0.3);
      box-shadow: 0 20px 60px rgba(2, 132, 199, 0.1);
    }

    .input-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }

    .form-control {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-box,
    .input-textarea {
      padding: 13px 16px;
      font-size: 15px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.5);
      color: var(--text-primary);
      font-family: inherit;
      transition: all 0.3s ease;
    }

    .input-box:focus,
    .input-textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
    }

    .input-textarea {
      min-height: 120px;
      resize: vertical;
      max-height: 300px;
      line-height: 1.6;
    }

    .char-count {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: right;
      margin-top: 4px;
    }

    .button-group {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      margin-top: 20px;
    }

    @media (max-width: 640px) {
      .button-group {
        grid-template-columns: 1fr;
      }
    }

    .btn {
      padding: 14px 24px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
      color: white;
      width: 100%;
      box-shadow: 0 10px 30px rgba(2, 132, 199, 0.2);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(2, 132, 199, 0.3);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(2, 132, 199, 0.15);
      color: var(--primary-light);
      border: 1px solid rgba(2, 132, 199, 0.3);
      padding: 12px 16px;
      font-size: 14px;
    }

    .btn-secondary:hover {
      background: rgba(2, 132, 199, 0.25);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .result-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding: 0 4px;
    }

    .result-title {
      font-size: 20px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .result-count {
      background: rgba(2, 132, 199, 0.15);
      border: 1px solid rgba(2, 132, 199, 0.3);
      color: var(--primary-light);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .result-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .result-item {
      background: var(--bg-item);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }

    .result-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .result-item:hover {
      border-color: rgba(2, 132, 199, 0.3);
      background: rgba(31, 41, 55, 0.9);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(2, 132, 199, 0.1);
    }

    .result-item:hover::before {
      opacity: 1;
    }

    .result-number {
      font-size: 11px;
      font-weight: 800;
      color: var(--primary-light);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .result-text {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text-primary);
      word-break: break-word;
      overflow-wrap: break-word;
      min-height: 140px;
      padding: 14px;
      background: rgba(15, 23, 42, 0.3);
      border-radius: 8px;
      cursor: text;
      user-select: text;
      transition: all 0.3s;
    }

    .result-text:hover {
      background: rgba(2, 132, 199, 0.08);
    }

    .result-actions {
      display: flex;
      gap: 8px;
      justify-self: end;
      margin-top: 8px;
    }

    .btn-copy,
    .btn-delete {
      flex: 1;
      padding: 9px 12px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid rgba(2, 132, 199, 0.3);
      background: rgba(2, 132, 199, 0.1);
      color: var(--primary-light);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: inherit;
    }

    .btn-copy:hover {
      background: rgba(2, 132, 199, 0.2);
      border-color: rgba(2, 132, 199, 0.5);
      transform: translateY(-1px);
    }

    .btn-copy.copied {
      background: rgba(16, 185, 129, 0.2);
      color: var(--success);
      border-color: rgba(16, 185, 129, 0.4);
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.1);
      color: #FCA5A5;
      border-color: rgba(239, 68, 68, 0.2);
    }

    .btn-delete:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
    }

    .batch-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .btn-batch {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 10px;
      border: 1px solid rgba(2, 132, 199, 0.3);
      background: rgba(2, 132, 199, 0.1);
      color: var(--primary-light);
      cursor: pointer;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: inherit;
    }

    .btn-batch:hover {
      background: rgba(2, 132, 199, 0.2);
      border-color: rgba(2, 132, 199, 0.5);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(2, 132, 199, 0.15);
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--bg-item);
      color: var(--text-primary);
      padding: 14px 20px;
      border-radius: 10px;
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-left: 3px solid var(--success);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      animation: slideIn 0.3s ease-out;
      z-index: 1000;
      max-width: 400px;
    }

    .toast.error {
      border-left-color: var(--danger);
      border-color: rgba(239, 68, 68, 0.3);
    }

    .toast.warning {
      border-left-color: var(--warning);
      border-color: rgba(245, 158, 11, 0.3);
    }

    @keyframes slideIn {
      from {
        transform: translateX(420px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes slideOut {
      to {
        transform: translateX(420px);
        opacity: 0;
      }
    }

    .toast.hide {
      animation: slideOut 0.3s ease-out forwards;
    }

    #copyBuffer {
      position: absolute;
      left: -9999px;
      top: -9999px;
    }

    @media (max-width: 640px) {
      .result-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .toast {
        right: 12px;
        left: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>
<body>

      </div>

      <div class="form-control">
        <label class="form-label" for="contentInput">内文及实物描述</label>

        <div class="char-count">

      <div class="button-group">
        <button id="generateBtn" class="btn btn-primary" onclick="app.generate()">

        <button id="clearBtn" class="btn btn-secondary" onclick="app.clear()" style="display:none;">
          清除
        </button>
      </div>
    </div>
  </div>

  <div class="result-section">
    <div id="resultWrap"></div>
  </div>

      ],

      typography: [
        "标题字号40-50厘米、副标题20-30厘米、产品标签10-15厘米，层级清晰",

        "文字与实物比例协调，不过大也不过小",
        "统一使用竖排或横排，不混搭不同排版方式"
      ]
    };

    // ===== 复制管理器 =====
    const copyManager = {
      async useClipboardAPI(text) {
        try {
          await navigator.clipboard.writeText(text);
          return true;
        } catch (err) {
          console.warn('Clipboard API failed:', err);
          return false;
        }
      },

      useExecCommand(text) {
        try {
          const textarea = document.getElementById('copyBuffer');
          textarea.value = text;
          textarea.select();
          textarea.setSelectionRange(0, text.length);
          const success = document.execCommand('copy');
          textarea.value = '';
          return success;
        } catch (err) {
          console.warn('ExecCommand failed:', err);
          return false;
        }
      },

      showManualCopy(text) {
        const textarea = document.getElementById('copyBuffer');
        textarea.value = text;
        textarea.select();
        textarea.setSelectionRange(0, text.length);
        
        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(textarea);
        selection.removeAllRanges();
        selection.addRange(range);
        
        return true;
      },

      async copy(text) {
        const apiSuccess = await this.useClipboardAPI(text);
        if (apiSuccess) {
          return { success: true, method: 'clipboard-api' };
        }

        const execSuccess = this.useExecCommand(text);
        if (execSuccess) {
          return { success: true, method: 'exec-command' };
        }

        this.showManualCopy(text);
        return { success: false, method: 'manual', needsHelp: true };
      }
    };

    // ===== 应用主程序 =====
    const app = {
      prompts: [],

      validate() {
        const space = this.trim('spaceInput');
        const theme = this.trim('themeInput');
        const content = this.trim('contentInput');

        if (!space) {
          this.toast('请输入空间类型', 'error');
          return false;
        }
        if (!theme) {
          this.toast('请输入文化墙主题', 'error');
          return false;
        }
        if (!content) {
          this.toast('请输入内文及实物描述', 'error');
          return false;
        }
        return true;
      },

      generate() {
        if (!this.validate()) return;

        const btn = document.getElementById('generateBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> 生成中...';

        setTimeout(() => {
          const space = this.trim('spaceInput');
          const theme = this.trim('themeInput');
          const content = this.trim('contentInput');

          this.prompts = this.buildPrompts(space, theme, content);
          this.render();

          btn.disabled = false;
          btn.innerHTML = '<span>✨</span> 生成20组提示词';
          document.getElementById('clearBtn').style.display = 'inline-flex';

          this.toast('✓ 已成功生成20组专业级提示词');
        }, 400);
      },

      buildPrompts(space, theme, content) {
        const prompts = [];

        for (let i = 0; i < 20; i++) {
          const displayMethod = designConfigs.displayMethods[i % designConfigs.displayMethods.length];
          const displayItem = designConfigs.displayItems[i % designConfigs.displayItems.length];
          const layout = designConfigs.layouts[i % designConfigs.layouts.length];
          const lighting = designConfigs.lightings[i % designConfigs.lightings.length];
          const color = designConfigs.colors[i % designConfigs.colors.length];
          const typography = designConfigs.typography[i % designConfigs.typography.length];

          const prompt = `${space}真实展示空间，${theme}实物展示文化墙，${displayMethod}。${displayItem}。内文内容为：${content}。${layout}。色彩采用${color}搭配，整体专业高级。文字排版：${typography}。所有文字为清晰可读的简体中文。照明方案为${lighting}。整体设计强调真实感、视觉冲击力、层次分明、信息明确，材质表现真实，可落地实施。正视角拍摄，镜头与文化墙保持垂直，整面文化墙完整出现在画面中，比例端正。文化墙正面完全展示。`;

          prompts.push(prompt);
        }

        return prompts;
      },

      render() {
        const wrap = document.getElementById('resultWrap');
        wrap.innerHTML = '';

        const header = document.createElement('div');
        header.className = 'result-header';
        header.innerHTML = `
          <div class="result-title">
            📋 生成结果
            <span class="result-count">${this.prompts.length} 组提示词</span>
          </div>
        `;
        wrap.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'result-grid';

        this.prompts.forEach((prompt, idx) => {
          const item = document.createElement('div');
          item.className = 'result-item';
          item.dataset.index = idx;

          item.innerHTML = `
            <div class="result-number">
              提示词 ${idx + 1}
            </div>
            <div class="result-text">${this.escape(prompt)}</div>
            <div class="result-actions">
              <button class="btn-copy" onclick="app.copySingle(${idx})">复制</button>
              <button class="btn-delete" onclick="app.delete(${idx})">删除</button>
            </div>
          `;

          grid.appendChild(item);
        });

        wrap.appendChild(grid);

        const batch = document.createElement('div');
        batch.className = 'batch-actions';
        batch.innerHTML = `
          <button class="btn-batch" onclick="app.copyAll()">复制全部20组</button>
          <button class="btn-batch" onclick="app.exportTxt()">导出为文本</button>
          <button class="btn-batch" onclick="app.clearResults()">清空结果</button>
        `;
        wrap.appendChild(batch);
      },

      async copySingle(idx) {
        const btns = document.querySelectorAll('.btn-copy');
        const btn = btns[idx];
        btn.disabled = true;
        
        const result = await copyManager.copy(this.prompts[idx]);
        
        if (result.success) {
          btn.classList.add('copied');
          btn.textContent = '已复制';
          this.toast('✓ 复制成功');
          
          setTimeout(() => {
            btn.classList.remove('copied');
            btn.innerHTML = '复制';
            btn.disabled = false;
          }, 2000);
        } else if (result.needsHelp) {
          this.toast('✓ 文本已选中，按 Ctrl+C 复制', 'warning');
          btn.innerHTML = '已选中';
          btn.disabled = false;
          
          setTimeout(() => {
            btn.innerHTML = '复制';
          }, 3000);
        } else {
          this.toast('复制失败，请使用导出功能', 'error');
          btn.disabled = false;
        }
      },

      async copyAll() {
        const text = this.prompts.map((p, i) => `【提示词${i + 1}】\n${p}`).join('\n\n');
        const result = await copyManager.copy(text);
        
        if (result.success) {
          this.toast('✓ 已复制全部20组提示词');
        } else if (result.needsHelp) {
          this.toast('✓ 文本已选中，按 Ctrl+C 复制全部', 'warning');
        } else {
          this.toast('复制失败，请使用导出功能', 'error');
        }
      },

      exportTxt() {
        const text = this.prompts.map((p, i) => `【提示词${i + 1}】\n${p}\n`).join('\n');
        const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `实物展示文化墙提示词_${Date.now()}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        this.toast('✓ 文件已下载');
      },

      delete(idx) {
        this.prompts.splice(idx, 1);
        this.render();
        this.toast('已删除该提示词');
      },

      clearResults() {
        if (confirm('确认要清空所有结果吗？')) {
          this.prompts = [];
          document.getElementById('resultWrap').innerHTML = '';
          this.toast('已清空所有结果');
        }
      },

      clear() {
        document.getElementById('spaceInput').value = '';
        document.getElementById('themeInput').value = '';
        document.getElementById('contentInput').value = '';
        document.getElementById('charCount').textContent = '0';
        document.getElementById('clearBtn').style.display = 'none';
        this.prompts = [];
        document.getElementById('resultWrap').innerHTML = '';
      },

      trim(id) {
        return document.getElementById(id).value.trim().replace(/\s+/g, ' ');
      },

      escape(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      },

      toast(msg, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type === 'error' ? 'error' : type === 'warning' ? 'warning' : ''}`;
        toast.textContent = msg;
        document.body.appendChild(toast);

        setTimeout(() => {
          toast.classList.add('hide');
          setTimeout(() => document.body.removeChild(toast), 300);
        }, 3000);
      }
    };

    document.getElementById('contentInput').addEventListener('input', (e) => {
      document.getElementById('charCount').textContent = e.target.value.length;
    });

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') app.generate();
    });
  </script>
